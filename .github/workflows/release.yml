name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build .dmg
        run: ./gradlew :desktop:packageDmg

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: desktop/build/compose/binaries/main/dmg/*.dmg

  build-fat-jar:
    name: Build fat jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build fat jar
        run: ./gradlew :desktop:fatJar

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: desktop/build/libs/aws-local-manager-*-all.jar

  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build .deb
        run: ./gradlew :desktop:packageDeb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: desktop/build/compose/binaries/main/deb/*.deb

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-fat-jar]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/linux

      - name: Download fat jar
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: artifacts/jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AWS Local Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/macos/*.dmg
            artifacts/linux/*.deb
            artifacts/jar/*.jar
